services:
  # 🎵 Duetto 音乐 — Node.js + WebSocket
  - type: web
    name: duetto
    env: node
    region: singapore
    buildCommand: npm install
    startCommand: npm start
    rootDir: Duetto
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 22

  # 🌿 瓶中生态 — Python 纯标准库
  - type: web
    name: cedareco
    env: python
    region: singapore
    buildCommand: pip install -r requirements.txt
    startCommand: python3 -m standalone_server
    rootDir: cedareco
    envVars:
      - key: PYTHON_VERSION
        value: 3.14.0

  # 📿 项圈 Collar — Next.js
  - type: web
    name: collar
    env: node
    region: singapore
    buildCommand: npm install && npm run build
    startCommand: npm start
    rootDir: collar-tmp
    envVars:
      - key: NODE_VERSION
        value: 22

  # 🌙 Eventide 生理 — Python 纯标准库
  # 注：用 bash wrapper 避免 Render 吞 .py 扩展名
  - type: web
    name: eventide
    env: python
    region: singapore
    buildCommand: ""
    startCommand: bash eventide-start.sh
    rootDir: .
    envVars:
      - key: PYTHON_VERSION
        value: 3.14.0

  # 🎙 hervoice 语情 — Python 纯标准库
  # 注：用 bash wrapper 避免 Render 吞 .py 扩展名
  - type: web
    name: hervoice
    env: python
    region: singapore
    buildCommand: ""
    startCommand: bash hervoice-start.sh
    rootDir: .
    envVars:
      - key: PYTHON_VERSION
        value: 3.14.0
