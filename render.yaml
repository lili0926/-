services:
  # 🎵 Duetto 音乐 — Node.js + WebSocket
  - type: web
    name: duetto
    env: node
    region: singapore
    buildCommand: npm install
    startCommand: bash start
    rootDir: Duetto
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 22

  # 🌿 瓶中生态 — Python 纯标准库
  - type: web
    name: cedareco
    env: python
    region: singapore
    buildCommand: pip install -r requirements.txt
    startCommand: bash start
    rootDir: cedareco
    envVars:
      - key: PYTHON_VERSION
        value: 3.14.0
