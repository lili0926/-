<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>🐾 小狗按钮</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;background:#faf3ee;min-height:100vh;padding:16px 12px;max-width:480px;margin:0 auto;color:#4a3f3a}
h1{font-size:22px;text-align:center;font-weight:700;letter-spacing:1px;padding-top:4px}
h1 small{font-size:12px;font-weight:400;opacity:.5;display:block;margin-top:2px}
.tabs{display:flex;gap:8px;justify-content:center;margin:14px 0 8px}
.tab{padding:7px 18px;border-radius:999px;font-size:13px;cursor:pointer;border:1.5px solid #ddd0c8;background:transparent;color:#8a766e;transition:all .2s}
.tab.on{background:linear-gradient(160deg,#d9a08f,#c98a80);color:#fff;border-color:#c98a80}
.tab.nsfw.on{background:linear-gradient(160deg,#d97070,#c94a4a);border-color:#c94a4a}
.info{display:flex;justify-content:space-between;align-items:center;padding:6px 4px 10px;font-size:13px;color:#8a766e}
.info b{color:#4a3f3a}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:12px}
.btn{aspect-ratio:1.1;border:none;border-radius:16px;font-size:14px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;padding:6px;transition:transform .15s,box-shadow .15s;word-break:break-word;line-height:1.3;font-weight:500;box-shadow:0 3px 10px rgba(120,95,88,.10)}
.btn:active{transform:scale(.92)}
.btn .icon{font-size:22px}
.btn.cozy{background:linear-gradient(165deg,#f5ede8,#ede0d8);border:1.5px solid rgba(255,255,255,.6);color:#5a4f48}
.btn.nsfw{background:linear-gradient(165deg,#fce8e8,#f5d4d4);border:1.5px solid rgba(255,200,200,.5);color:#6a3a3a}
.timeline{background:rgba(255,255,255,.5);border-radius:16px;padding:12px 14px;margin-top:4px;border:1px solid rgba(255,255,255,.5);max-height:240px;overflow-y:auto;scrollbar-width:thin}
.tl-title{font-size:13px;font-weight:600;color:#8a766e;margin-bottom:8px;display:flex;justify-content:space-between}
.tl-item{font-size:13px;padding:6px 0;border-bottom:1px solid rgba(0,0,0,.04);line-height:1.5;animation:tlIn .3s ease}
.tl-item:last-child{border-bottom:none}
@keyframes tlIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.tl-time{font-size:11px;color:#b8a89e;margin-right:6px}
.tl-who{font-size:11px;color:#c98a80;font-weight:600;margin-right:4px}
.tl-msg{color:#4a3f3a}
.tl-ai{background:rgba(201,138,128,.08);border-radius:8px;padding:5px 8px;margin:4px 0}
.empty-tl{text-align:center;padding:20px 0;color:#b8a89e;font-size:13px}
.actions{display:flex;gap:8px;justify-content:center;margin-top:10px}
.actions button{padding:6px 16px;border-radius:999px;border:1px solid #ddd0c8;background:transparent;color:#8a766e;font-size:12px;cursor:pointer;transition:all .2s}
.actions button:active{transform:scale(.93)}
.actions button.primary{background:#c98a80;color:#fff;border-color:#c98a80}
</style>
</head>
<body>
<h1>🐾 小狗按钮<small>按一下，说你想说的话</small></h1>

<div class="tabs">
  <div class="tab on" id="tabCozy" onclick="switchMode('cozy')">☕ 温馨</div>
  <div class="tab nsfw" id="tabNsfw" onclick="switchMode('nsfw')">🔥 NSFW</div>
</div>

<div class="info">
  <span>今天按了 <b id="todayCount">0</b> 次</span>
  <span>总共 <b id="totalCount">0</b> 条留言</span>
</div>

<div class="grid" id="grid"></div>

<div class="timeline" id="timeline">
  <div class="tl-title">
    <span>📝 留言板</span>
    <span style="font-size:11px;cursor:pointer" onclick="clearLogs()">清空</span>
  </div>
  <div id="tlList"></div>
</div>

<div class="actions">
  <button onclick="exportLogs()">📤 导出留言</button>
  <button class="primary" onclick="simulateAI()">🤖 模拟 Aries 按一下</button>
</div>

<script>
(function(){
  const STORAGE_KEY = 'dog_buttons_log';

  // ── 按钮定义 ──
  const COZY_BUTTONS = [
    { icon: '❤️', label: '想你啦' },
    { icon: '🌙', label: '晚安' },
    { icon: '☀️', label: '早安' },
    { icon: '🍚', label: '记得吃饭' },
    { icon: '😊', label: '今天开心' },
    { icon: '🛁', label: '快去洗澡' },
    { icon: '📖', label: '讲故事' },
    { icon: '🎵', label: '一起听歌' },
    { icon: '💤', label: '困了' },
    { icon: '🧸', label: '抱抱' },
    { icon: '☕', label: '喝杯咖啡' },
    { icon: '🌈', label: '今天加油' },
  ];

  const NSFW_BUTTONS = [
    { icon: '🔥', label: '想要' },
    { icon: '💋', label: '亲亲' },
    { icon: '🫦', label: '别停' },
    { icon: '🌊', label: '还要' },
    { icon: '💕', label: '好舒服' },
    { icon: '🛌', label: '来床上' },
    { icon: '🎀', label: '今天可以' },
    { icon: '👅', label: '舔舔' },
    { icon: '💦', label: '受不了' },
    { icon: '🖤', label: '轻点' },
    { icon: '🔞', label: '想色色' },
    { icon: '🌹', label: '你说了算' },
  ];

  let currentMode = 'cozy';
  let logs = [];

  function loadLogs(){
    try{ logs = JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }catch(e){ logs = []; }
  }
  function saveLogs(){
    try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(logs)); }catch(e){}
    updateInfo();
    renderTimeline();
  }

  function getButtons(){ return currentMode === 'nsfw' ? NSFW_BUTTONS : COZY_BUTTONS; }

  function renderGrid(){
    const btns = getButtons();
    const cls = currentMode === 'nsfw' ? 'nsfw' : 'cozy';
    grid.innerHTML = btns.map((b,i) =>
      `<button class="btn ${cls}" onclick="pressButton(${i},'human')">
        <span class="icon">${b.icon}</span>${b.label}
      </button>`
    ).join('');
  }

  // 按按钮
  window.pressButton = function(idx, who){
    const btns = getButtons();
    const b = btns[idx];
    if(!b) return;
    const now = new Date();
    const ts = now.toISOString();
    const timeStr = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
    const label = who === 'ai' ? '🤖 Aries' : '💁 你';
    logs.unshift({
      ts,
      timeStr,
      icon: b.icon,
      label: b.label,
      text: b.icon + ' ' + b.label,
      who,
      whoLabel: label,
      mode: currentMode
    });
    // 最多保留 200 条
    if(logs.length > 200) logs = logs.slice(0, 200);
    saveLogs();
    renderGrid();

    // 按钮动画反馈——闪一下
    const allBtns = grid.querySelectorAll('.btn');
    if(allBtns[idx]){
      allBtns[idx].style.transform = 'scale(.88)';
      setTimeout(() => { allBtns[idx].style.transform = ''; }, 200);
    }

    // 如果是AI按的，通知父页面
    if(who === 'ai'){
      try {
        window.parent.postMessage({ type: 'dog-button-press', text: b.icon + ' ' + b.label }, '*');
      } catch(e) {}
    }
  };

  function renderTimeline(){
    const list = document.getElementById('tlList');
    if(!logs.length){
      list.innerHTML = '<div class="empty-tl">还没有人按过按钮 🐾<br>按一下试试吧</div>';
      return;
    }
    list.innerHTML = logs.slice(0, 40).map(log => {
      const isAi = log.who === 'ai';
      return `<div class="tl-item${isAi ? ' tl-ai' : ''}">
        <span class="tl-time">${log.timeStr}</span>
        <span class="tl-who">${log.whoLabel}</span>
        <span class="tl-msg">${log.icon} ${escHtml(log.label)}</span>
      </div>`;
    }).join('');
  }

  function escHtml(s){
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }
  window.escHtml = escHtml;

  function updateInfo(){
    const today = new Date().toDateString();
    const todayCount = logs.filter(l => new Date(l.ts).toDateString() === today).length;
    document.getElementById('todayCount').textContent = todayCount;
    document.getElementById('totalCount').textContent = logs.length;
  }

  // 模式切换
  window.switchMode = function(mode){
    currentMode = mode;
    document.getElementById('tabCozy').className = 'tab' + (mode==='cozy'?' on':'');
    document.getElementById('tabNsfw').className = 'tab nsfw' + (mode==='nsfw'?' on':'');
    renderGrid();
  };

  // 模拟 AI 按按钮
  window.simulateAI = function(){
    const btns = getButtons();
    if(!btns.length) return;
    // 随机选择当前模式下 1~3 个按钮
    const count = 1 + Math.floor(Math.random() * Math.min(3, btns.length));
    const indices = [];
    while(indices.length < count){
      const r = Math.floor(Math.random() * btns.length);
      if(!indices.includes(r)) indices.push(r);
    }
    // 逐个按下（间隔 500ms）
    indices.forEach((idx, i) => {
      setTimeout(() => {
        window.pressButton(idx, 'ai');
      }, i * 600);
    });
  };

  // 清空日志
  window.clearLogs = function(){
    if(!confirm('确定要清空所有留言吗？')) return;
    logs = [];
    saveLogs();
  };

  // 导出
  window.exportLogs = function(){
    if(!logs.length){ alert('还没有留言可以导出'); return; }
    const text = logs.map(l =>
      `[${new Date(l.ts).toLocaleString('zh-CN')}] ${l.whoLabel}：${l.icon} ${l.label}`
    ).join('\n');
    const blob = new Blob([text], {type:'text/plain;charset=utf-8'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = '小狗按钮留言_' + new Date().toISOString().slice(0,10) + '.txt';
    a.click();
    URL.revokeObjectURL(a.href);
  };

  // 暴露给外部：AI 自动按按钮
  window.dogButtonsAutoPress = function(mode, count){
    if(mode) { currentMode = mode; switchMode(mode); }
    const btns = getButtons();
    const num = count || (1 + Math.floor(Math.random() * 3));
    const indices = [];
    while(indices.length < Math.min(num, btns.length)){
      const r = Math.floor(Math.random() * btns.length);
      if(!indices.includes(r)) indices.push(r);
    }
    indices.forEach((idx, i) => {
      setTimeout(() => window.pressButton(idx, 'ai'), i * 500);
    });
    return indices.map(i => btns[i].label);
  };

  // 初始化
  loadLogs();
  switchMode('cozy');
  updateInfo();
  renderTimeline();
})();
</script>
</body>
</html>
