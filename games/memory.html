<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>翻牌记忆</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;background:#faf3ee;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px}
.game{width:100%;max-width:400px;text-align:center}
h1{font-size:22px;font-weight:700;color:#4a3f3a;margin-bottom:4px;letter-spacing:2px}
.sub{font-size:13px;color:#b8a89e;margin-bottom:16px}
.top{display:flex;justify-content:space-between;align-items:center;padding:8px 4px 14px}
.score{font-size:14px;color:#8a766e}
.score b{color:#4a3f3a;font-size:18px}
.btn{padding:8px 20px;border:none;border-radius:20px;font-size:13px;cursor:pointer;transition:transform .15s;background:linear-gradient(160deg,#d9a08f,#c98a80);color:#fff;box-shadow:0 4px 12px rgba(201,138,128,.35)}
.btn:active{transform:scale(.93)}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:0 auto}
.card{aspect-ratio:1;border-radius:14px;cursor:pointer;perspective:600px;transition:transform .15s}
.card:active{transform:scale(.94)}
.card-inner{width:100%;height:100%;position:relative;transition:transform .4s cubic-bezier(.4,0,.2,1);transform-style:preserve-3d}
.card.flipped .card-inner,.card.matched .card-inner{transform:rotateY(180deg)}
.card-face{position:absolute;inset:0;border-radius:14px;display:flex;align-items:center;justify-content:center;backface-visibility:hidden;-webkit-backface-visibility:hidden}
.card-back{
  background:linear-gradient(160deg,#e8ded8,#d8cbc4);
  border:2px solid rgba(255,255,255,.5);
  box-shadow:0 4px 12px rgba(120,95,88,.12);
}
.card-back::after{content:"?";font-size:32px;color:rgba(120,95,88,.35);font-weight:700}
.card-front{
  background:linear-gradient(170deg,rgba(255,250,246,.92),rgba(248,238,234,.88));
  border:2px solid rgba(255,255,255,.6);
  transform:rotateY(180deg);
  font-size:36px;
  box-shadow:0 4px 12px rgba(120,95,88,.08);
}
.card.matched .card-front{background:linear-gradient(170deg,rgba(200,230,200,.88),rgba(180,220,180,.82));border-color:rgba(160,200,160,.5)}
.msg{height:40px;display:flex;align-items:center;justify-content:center;margin-top:14px;font-size:14px;color:#8a766e;transition:opacity .3s}
.win{color:#6a9a6a;font-weight:600;font-size:16px}
@media(max-width:360px){.grid{gap:8px}.card-front{font-size:28px}.card-back::after{font-size:24px}}
</style>
</head>
<body>
<div class="game">
  <h1>🌸 翻牌记忆</h1>
  <div class="sub">找出所有相同的配对</div>
  <div class="top">
    <div class="score">步数 <b id="moves">0</b></div>
    <div class="score">配对 <b id="pairs">0</b>/8</div>
    <button class="btn" id="resetBtn">🔄 重开</button>
  </div>
  <div class="grid" id="grid"></div>
  <div class="msg" id="msg"></div>
</div>
<script>
(function(){
  const EMOJIS = ['🌸','🌿','🦉','🌙','☕','🍃','✨','🌊'];
  let cards = [], flipped = [], locked = false, moves = 0, pairs = 0;
  const grid = document.getElementById('grid');
  const movesEl = document.getElementById('moves');
  const pairsEl = document.getElementById('pairs');
  const msgEl = document.getElementById('msg');

  function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}

  function init(){
    cards = shuffle([...EMOJIS,...EMOJIS]).map((emoji,i)=>({id:i,emoji,flipped:false,matched:false}));
    flipped = []; locked = false; moves = 0; pairs = 0;
    movesEl.textContent = '0'; pairsEl.textContent = '0/8';
    msgEl.textContent = ''; msgEl.className = 'msg';
    render();
  }

  function render(){
    grid.innerHTML = cards.map(c => `
      <div class="card${c.flipped||c.matched?' flipped':''}${c.matched?' matched':''}" data-idx="${c.id}" onclick="flipCard(this)">
        <div class="card-inner">
          <div class="card-face card-front">${c.emoji}</div>
          <div class="card-face card-back"></div>
        </div>
      </div>
    `).join('');
  }

  function flipCard(el){
    if(locked) return;
    const idx = parseInt(el.dataset.idx);
    const card = cards[idx];
    if(card.flipped || card.matched) return;
    if(flipped.length >= 2) return;
    card.flipped = true;
    flipped.push(card);
    render();
    if(flipped.length === 2){
      locked = true;
      moves++;
      movesEl.textContent = moves;
      const [a,b] = flipped;
      if(a.emoji === b.emoji){
        a.matched = true; b.matched = true;
        pairs++; pairsEl.textContent = pairs + '/8';
        flipped = []; locked = false;
        render();
        if(pairs === 8){
          msgEl.textContent = '🎉 全部找到啦！太棒了！';
          msgEl.className = 'msg win';
        }
      } else {
        setTimeout(() => {
          a.flipped = false; b.flipped = false;
          flipped = []; locked = false;
          render();
        }, 700);
      }
    }
  }

  document.getElementById('resetBtn').addEventListener('click', init);
  window.flipCard = flipCard;
  init();
})();
</script>
</body>
</html>
