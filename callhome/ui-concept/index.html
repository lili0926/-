<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>listening · 双人贴合</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; background: #141110; }

  .app {
    --grad: linear-gradient(165deg, #2b2723, #141110 72%);
    --blob-a: rgba(216,208,196,.16); --blob-b: rgba(170,160,148,.14);
    --text: #f3efe9; --muted: #948c80; --soft: #ccc4b8; --ring: #191510;
    --glass: rgba(255,252,246,.13); --glass-bd: rgba(255,250,242,.20);
    --bubL: rgba(250,247,241,.62); --bubL-bd: rgba(255,255,255,.4); --bubL-tx: #2f2b25;
    --bubR: #f2ede4; --bubR-tx: #2a2622;
    position: relative; width: 100%; min-height: 100vh; overflow: hidden;
  }
  .app.cool {
    --grad: linear-gradient(165deg, #24262b, #0e1013 72%);
    --blob-a: rgba(196,206,216,.16); --blob-b: rgba(146,156,170,.14);
    --text: #eef1f4; --muted: #828a94; --soft: #b8c0cc; --ring: #0f1216;
    --glass: rgba(246,250,255,.13); --glass-bd: rgba(242,248,255,.20);
    --bubL: rgba(244,247,251,.62); --bubL-bd: rgba(255,255,255,.4); --bubL-tx: #23272f;
    --bubR: #e9edf2; --bubR-tx: #1a1e24;
  }

  .bg { position: absolute; inset: 0; z-index: 0; background: var(--grad); }
  .bg::before, .bg::after { content: ''; position: absolute; border-radius: 50%; }
  .bg::before { width: 340px; height: 340px; background: var(--blob-a); filter: blur(60px); top: -60px; left: -60px; animation: drift1 15s ease-in-out infinite alternate; }
  .bg::after  { width: 360px; height: 220px; background: var(--blob-b); filter: blur(60px); bottom: 20px; left: 50%; transform: translateX(-50%); animation: drift2 18s ease-in-out infinite alternate; }
  @keyframes drift1 { from { transform: translate(0,0);} to { transform: translate(34px,22px);} }
  @keyframes drift2 { from { transform: translateX(-50%);} to { transform: translate(calc(-50% + 26px),-16px);} }

  .photo { position: absolute; inset: 0; z-index: 0; background-size: cover; background-position: center; }
  .tint  { position: absolute; inset: 0; z-index: 0; background: #0e0c0a; opacity: 0; transition: opacity .4s; }
  .app.has-photo .tint { opacity: .5; }
  .app.no-tint .tint { opacity: 0 !important; }

  .ui {
    position: relative; z-index: 1; max-width: 460px; margin: 0 auto;
    min-height: 100vh; display: flex; flex-direction: column;
    padding: 26px 8px 24px; color: var(--text);
    animation: fadein .7s ease both; transition: opacity .8s ease, transform .8s ease;
  }
  @keyframes fadein { from { opacity: 0; transform: translateY(10px);} to { opacity: 1; transform: none;} }

  .gear {
    position: absolute; top: 22px; right: 18px; z-index: 3; cursor: pointer;
    width: 38px; height: 38px; border-radius: 50%; color: var(--text);
    display: flex; align-items: center; justify-content: center;
    background: var(--glass); border: 1px solid var(--glass-bd);
    -webkit-backdrop-filter: blur(14px); backdrop-filter: blur(14px);
  }
  .gear svg { width: 20px; height: 20px; }

  .meta { text-align: center; padding: 4px 16px 0; }
  .kind { display: inline-flex; align-items: center; gap: 7px; font-size: 13px; color: var(--soft); letter-spacing: 1.5px; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; animation: pulse 1.4s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity: .3; transform: scale(.8);} 50% { opacity: 1; transform: scale(1.1);} }
  .timer { font-size: 21px; font-weight: 600; margin: 8px 0 6px; }
  .greet { font-size: 13px; color: var(--soft); margin-bottom: 12px; }
  .enc { display: inline-flex; align-items: center; gap: 5px; font-size: 12px; color: var(--muted); }
  .enc svg { width: 11px; height: 11px; }

  /* 两个头像:叠在一起 + 名字 + 一条共用声波 */
  .mid { display: flex; flex-direction: column; align-items: center; gap: 14px; padding: 22px 18px 6px; }
  .pair { display: flex; }
  .avatar {
    width: 96px; height: 96px; border-radius: 50%; overflow: hidden;
    display: flex; align-items: center; justify-content: center;
    background: linear-gradient(160deg, #423d36, #262220);
  }
  .pair .avatar + .avatar { margin-left: -20px; filter: drop-shadow(-4px 1px 7px rgba(0,0,0,.5)); }
  .avatar svg { width: 46px; height: 46px; color: rgba(255,250,242,.78); }
  .avatar img { width: 100%; height: 100%; object-fit: cover; }
  .names { display: flex; gap: 30px; }
  .names span { font-size: 15px; font-weight: 500; opacity: .55; transition: opacity .2s; }
  #wave { width: 210px; height: 54px; display: block; }

  .caps { flex: 1; overflow-y: auto; scrollbar-width: none; display: flex; flex-direction: column; gap: 10px; padding: 10px 22px 14px; }
  .caps::-webkit-scrollbar { display: none; }
  .bubble { max-width: 78%; padding: 9px 13px; font-size: 14px; line-height: 1.5; border-radius: 16px; animation: rise .3s ease; word-break: break-word; }
  .bubble.left {
    align-self: flex-start; color: var(--bubL-tx); border-bottom-left-radius: 5px;
    background: var(--bubL); border: 1px solid var(--bubL-bd);
    -webkit-backdrop-filter: blur(16px) saturate(140%); backdrop-filter: blur(16px) saturate(140%);
  }
  .bubble.right { align-self: flex-end; color: var(--bubR-tx); border-bottom-right-radius: 5px; background: var(--bubR); }
  @keyframes rise { from { opacity: 0; transform: translateY(8px);} to { opacity: 1; transform: none;} }
  .txt.caret::after { content: '▏'; opacity: .6; margin-left: 1px; }
  .typing { display: inline-flex; gap: 4px; align-items: center; height: 14px; }
  .typing i { width: 6px; height: 6px; border-radius: 50%; background: currentColor; opacity: .4; animation: bounce 1.2s infinite; }
  .typing i:nth-child(2) { animation-delay: .15s; }
  .typing i:nth-child(3) { animation-delay: .3s; }
  @keyframes bounce { 0%,60%,100% { transform: translateY(0); opacity: .35;} 30% { transform: translateY(-5px); opacity: .9;} }

  .dock { display: flex; justify-content: center; gap: 20px; padding: 14px 14px 6px; }
  .btn { display: flex; flex-direction: column; align-items: center; gap: 9px; cursor: pointer; }
  .ico {
    width: 62px; height: 62px; border-radius: 50%; color: var(--text);
    display: flex; align-items: center; justify-content: center;
    background: var(--glass); border: 1px solid var(--glass-bd);
    -webkit-backdrop-filter: blur(18px) saturate(160%); backdrop-filter: blur(18px) saturate(160%);
    transition: transform .12s;
  }
  .btn:active .ico { transform: scale(.93); }
  .ico svg { width: 26px; height: 26px; }
  .ico.end { background: var(--bubR); border-color: var(--bubR); color: #1a1714; }
  .lab { font-size: 12px; color: var(--soft); }

  .sheet-back { position: absolute; inset: 0; z-index: 5; background: rgba(0,0,0,.4); opacity: 0; pointer-events: none; transition: opacity .3s; }
  .app.settings .sheet-back { opacity: 1; pointer-events: auto; }
  .sheet {
    position: absolute; left: 0; right: 0; bottom: 0; z-index: 6; max-width: 460px; margin: 0 auto;
    color: var(--text); background: var(--glass); border-top: 1px solid var(--glass-bd);
    -webkit-backdrop-filter: blur(26px) saturate(170%); backdrop-filter: blur(26px) saturate(170%);
    border-radius: 22px 22px 0 0; padding: 8px 20px 26px;
    transform: translateY(100%); transition: transform .35s cubic-bezier(.3,.8,.3,1);
  }
  .app.settings .sheet { transform: translateY(0); }
  .handle { width: 40px; height: 5px; border-radius: 3px; background: rgba(160,160,160,.4); margin: 6px auto 16px; }
  .sheet h3 { font-size: 16px; font-weight: 600; margin-bottom: 16px; }
  .sec { margin-bottom: 20px; }
  .lab2 { font-size: 12px; color: var(--muted); margin-bottom: 10px; letter-spacing: .5px; }
  .chips { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  .chip { padding: 9px 16px; border-radius: 12px; font-size: 13px; cursor: pointer; border: 1px solid var(--glass-bd); background: rgba(255,255,255,.06); color: var(--text); }
  .chip.on { background: var(--text); color: #151311; border-color: var(--text); }
  .sub2 { font-size: 12px; color: var(--muted); }
  .av-row { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
  .mini { width: 40px; height: 40px; border-radius: 50%; overflow: hidden; flex-shrink: 0; background: linear-gradient(160deg,#423d36,#262220); display: flex; align-items: center; justify-content: center; }
  .mini svg { width: 22px; height: 22px; color: rgba(255,250,242,.75); }
  .mini img { width: 100%; height: 100%; object-fit: cover; }
  .nm { flex: 1; font-size: 14px; }
  .done { margin-top: 4px; text-align: center; }

  .veil { position: absolute; inset: 0; z-index: 8; background: #100e0c; opacity: 0; pointer-events: none; transition: opacity .8s ease; display: flex; align-items: center; justify-content: center; }
  .app.ending .veil { opacity: .94; pointer-events: auto; }
  .app.ending .ui { opacity: 0; transform: scale(.96); }
  .bye { text-align: center; color: #e9e4db; opacity: 0; transform: translateY(6px); transition: opacity .6s ease .35s, transform .6s ease .35s; }
  .app.ending .bye { opacity: 1; transform: none; }
  .bye .t1 { font-size: 19px; font-weight: 500; }
  .bye .t2 { font-size: 13px; color: #9a9188; margin-top: 8px; }
  .restart { margin-top: 22px; padding: 10px 24px; border-radius: 999px; font-size: 14px; cursor: pointer; color: #f3efe9; background: rgba(255,252,246,.10); border: 1px solid rgba(255,250,242,.25); -webkit-backdrop-filter: blur(10px); backdrop-filter: blur(10px); }
</style>
</head>
<body>

  <div class="app" id="app">
    <div class="bg"></div>
    <div class="photo" id="photo"></div>
    <div class="tint"></div>

    <div class="ui">
      <div class="gear" id="gear"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 7h9M17 7h3M4 17h3M11 17h9"/><circle cx="15" cy="7" r="2.3"/><circle cx="9" cy="17" r="2.3"/></svg></div>

      <div class="meta">
        <div class="kind"><span class="dot"></span> listening</div>
        <div class="timer" id="timer">0:47</div>
        <div class="greet" id="greet"></div>
        <div class="enc">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="11" width="16" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>
          端到端加密
        </div>
      </div>

      <div class="mid">
        <div class="pair">
          <div class="avatar" id="av0"><svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-6 8-6s8 2 8 6v1H4v-1z"/></svg></div>
          <div class="avatar" id="av1"><svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-6 8-6s8 2 8 6v1H4v-1z"/></svg></div>
        </div>
        <div class="names"><span id="name0">对方</span><span id="name1">我</span></div>
        <canvas id="wave"></canvas>
      </div>

      <div class="caps" id="caps"></div>

      <div class="dock">
        <div class="btn">
          <div class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="9" y="3" width="6" height="11" rx="3"/><path d="M6 11a6 6 0 0 0 12 0M12 17v4"/></svg></div>
          <div class="lab">静音</div>
        </div>
        <div class="btn">
          <div class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 9v6h4l5 4V5L8 9H4z"/><path d="M16.5 8.5a4 4 0 0 1 0 7"/></svg></div>
          <div class="lab">扬声器</div>
        </div>
        <div class="btn">
          <div class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="6" width="12" height="12" rx="2"/><path d="M21 8l-6 4 6 4V8z"/></svg></div>
          <div class="lab">摄像头</div>
        </div>
        <div class="btn" id="endBtn">
          <div class="ico end"><svg viewBox="0 0 24 24" fill="currentColor"><g transform="rotate(135 12 12)"><path d="M6.6 10.8c1.4 2.8 3.8 5.2 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.4.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1C10.6 21 3 13.4 3 4c0-.6.4-1 1-1h3.6c.6 0 1 .4 1 1 0 1.2.2 2.5.6 3.6.1.4 0 .8-.2 1l-3 2.2z"/></g></svg></div>
          <div class="lab">挂断</div>
        </div>
      </div>
    </div>

    <div class="sheet-back" id="sheetBack"></div>
    <div class="sheet" id="sheet">
      <div class="handle"></div>
      <h3>设置</h3>

      <div class="sec">
        <div class="lab2">背景</div>
        <div class="chips">
          <div class="chip" id="bgUpload">上传背景图</div>
          <div class="chip" id="bgClear">恢复默认</div>
        </div>
        <div class="chips" style="margin-top:10px;">
          <span class="sub2">蒙层</span>
          <div class="chip on" id="tintOn">开</div>
          <div class="chip" id="tintOff">关</div>
        </div>
        <input type="file" id="bgFile" accept="image/*" hidden>
      </div>

      <div class="sec">
        <div class="lab2">毛玻璃色调</div>
        <div class="chips">
          <div class="chip on" id="warmBtn">暖色</div>
          <div class="chip" id="coolBtn">冷色</div>
        </div>
      </div>

      <div class="sec">
        <div class="lab2">头像</div>
        <div class="av-row">
          <div class="mini" id="mini0"><svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-6 8-6s8 2 8 6v1H4v-1z"/></svg></div>
          <div class="nm">对方</div>
          <div class="chip" id="av0Btn">更换</div>
        </div>
        <div class="av-row">
          <div class="mini" id="mini1"><svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-6 8-6s8 2 8 6v1H4v-1z"/></svg></div>
          <div class="nm">我</div>
          <div class="chip" id="av1Btn">更换</div>
        </div>
        <input type="file" id="av0File" accept="image/*" hidden>
        <input type="file" id="av1File" accept="image/*" hidden>
      </div>

      <div class="chip on done" id="doneBtn">完成</div>
    </div>

    <div class="veil">
      <div class="bye">
        <div class="t1">通话结束</div>
        <div class="t2" id="byeLine">回头再聊</div>
        <div class="restart" id="restart">重新通话</div>
      </div>
    </div>
  </div>

<script>
(function(){
  var app = document.getElementById('app');
  var avatars = [document.getElementById('av0'), document.getElementById('av1')];
  var minis = [document.getElementById('mini0'), document.getElementById('mini1')];
  var nameEls = [document.getElementById('name0'), document.getElementById('name1')];
  var waveEl = document.getElementById('wave');
  var caps = document.getElementById('caps');
  var glowRGB = '255,240,216';   // 暖色发光(略带琥珀)

  function fit(cv){
    var dpr = window.devicePixelRatio || 1;
    var w = cv.clientWidth, h = cv.clientHeight;
    cv.width = w * dpr; cv.height = h * dpr;
    var ctx = cv.getContext('2d');
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    return { ctx: ctx, w: w, h: h };
  }
  var Wd = fit(waveEl);
  window.addEventListener('resize', function(){ Wd = fit(waveEl); });

  function drawWave(t, level){
    var ctx = Wd.ctx, w = Wd.w, h = Wd.h, cy = h / 2;
    ctx.clearRect(0, 0, w, h);
    ctx.shadowColor = 'rgba(255,252,248,.45)'; ctx.shadowBlur = 4;
    var amp = 0.06 + level * 0.72;                 // 静默≈细线,说话时浪头起来
    var N = 44, F = 3.8, spread = 1, taper = 4, speed = 1.6;
    for (var i = 0; i < N; i++){
      var frac = i / (N - 1);
      var fi = F * (1 + (frac - 0.5) * spread);     // 频率略失谐 → 交织出明暗
      var amul = 0.45 + 0.55 * Math.sin(frac * Math.PI);
      var shimmer = Math.sin(t * 0.7) * frac * 1.6;
      var alpha = 0.05 + 0.05 * Math.sin(frac * Math.PI);
      ctx.beginPath();
      for (var x = 0; x <= w; x += 2){
        var nx = x / w;
        var env = Math.pow(Math.sin(Math.PI * nx), taper);   // 收尖:两头细成线
        var arg = (nx - 0.5) * Math.PI * 2 * fi + t * speed + shimmer;
        var y = cy + env * (amp * amul * h) * Math.sin(arg);
        x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      }
      ctx.strokeStyle = 'rgba(255,252,248,' + alpha + ')';
      ctx.lineWidth = 1;
      ctx.stroke();
    }
  }

  var lvl = [0, 0], speaker = -1, t = 0;
  (function loop(){
    t += 0.03;
    for (var k = 0; k < 2; k++){
      var tgt = (speaker === k)
        ? (0.22 + 0.20 * Math.abs(Math.sin(t * 6 + k)) + 0.10 * Math.sin(t * 11 + k))
        : 0.02;
      if (tgt < 0) tgt = 0;
      lvl[k] += (tgt - lvl[k]) * 0.15;
      // 更重的发光:更亮 + 带扩散
      avatars[k].style.boxShadow = '0 0 ' + (14 + lvl[k] * 64) + 'px ' + (lvl[k] * 14) + 'px rgba(' + glowRGB + ',' + (0.20 + lvl[k] * 0.9) + ')';
      avatars[k].style.transform = 'scale(' + (1 + lvl[k] * 0.03) + ')';
      nameEls[k].style.opacity = 0.5 + Math.min(lvl[k] * 3.5, 0.5);
    }
    drawWave(t, Math.max(lvl[0], lvl[1]));   // 共用一条声波,谁说话它就跳
    requestAnimationFrame(loop);
  })();

  function greetingFor(h){
    if (h >= 5 && h < 8)  return '天刚亮，慢慢醒';
    if (h >= 8 && h < 11) return '上午好，慢慢说';
    if (h >= 11 && h < 13) return '中午好，记得吃饭';
    if (h >= 13 && h < 18) return '下午好，喝口水';
    if (h >= 18 && h < 22) return '晚上好，聊会儿吧';
    return '夜深了，慢慢聊';
  }
  function byeFor(h){
    if (h >= 22 || h < 5) return '晚安，早点休息';
    if (h >= 5 && h < 11) return '今天也加油';
    if (h >= 18) return '晚上愉快';
    return '回头再聊';
  }
  document.getElementById('greet').textContent = greetingFor(new Date().getHours());

  var turns = [
    { who: 0, text: '喂，能听清吗？' },
    { who: 1, text: '挺清楚的，你那边呢？' },
    { who: 0, text: '两个头像贴一起了，看着更亲近。' },
    { who: 1, text: '对，发光也重了，谁说话一眼就看出来。' },
    { who: 0, text: '照片那层膜也能关掉了。' },
    { who: 1, text: '完美，那就先这样。' },
    { who: 0, text: '好，回头发你。' }
  ];
  var ti = 0, active = true;

  function nextTurn(){
    if (!active) return;
    var turn = turns[ti % turns.length];
    ti++;
    speaker = turn.who;

    var b = document.createElement('div');
    b.className = 'bubble ' + (turn.who === 0 ? 'left' : 'right');
    var txt = document.createElement('span');
    txt.className = 'txt';
    txt.innerHTML = '<span class="typing"><i></i><i></i><i></i></span>';
    b.appendChild(txt);
    caps.appendChild(b);
    while (caps.children.length > 6) caps.removeChild(caps.firstChild);
    caps.scrollTop = caps.scrollHeight;

    setTimeout(function(){
      if (!active) return;
      txt.textContent = '';
      txt.classList.add('caret');
      var i = 0;
      (function type(){
        if (!active) return;
        if (i <= turn.text.length){
          txt.textContent = turn.text.slice(0, i);
          caps.scrollTop = caps.scrollHeight;
          i++;
          setTimeout(type, 62);
        } else {
          txt.classList.remove('caret');
          speaker = -1;
          setTimeout(nextTurn, 700);
        }
      })();
    }, 850);
  }
  setTimeout(nextTurn, 500);

  var sec = 47, tEl = document.getElementById('timer');
  setInterval(function(){
    if (!active) return;
    sec++;
    var m = Math.floor(sec / 60), s = sec % 60;
    tEl.textContent = m + ':' + (s < 10 ? '0' + s : s);
  }, 1000);

  document.getElementById('endBtn').addEventListener('click', function(){
    if (!active) return;
    active = false; speaker = -1;
    document.getElementById('byeLine').textContent = byeFor(new Date().getHours());
    app.classList.add('ending');
  });
  document.getElementById('restart').addEventListener('click', function(){
    app.classList.remove('ending');
    caps.innerHTML = ''; ti = 0; sec = 47; speaker = -1;
    tEl.textContent = '0:47';
    active = true;
    setTimeout(nextTurn, 500);
  });

  var gear = document.getElementById('gear'), sheetBack = document.getElementById('sheetBack');
  gear.addEventListener('click', function(){ app.classList.add('settings'); });
  sheetBack.addEventListener('click', function(){ app.classList.remove('settings'); });
  document.getElementById('doneBtn').addEventListener('click', function(){ app.classList.remove('settings'); });

  var warmBtn = document.getElementById('warmBtn'), coolBtn = document.getElementById('coolBtn');
  function setTheme(cool){
    app.classList.toggle('cool', cool);
    warmBtn.classList.toggle('on', !cool);
    coolBtn.classList.toggle('on', cool);
    glowRGB = cool ? '218,234,255' : '255,240,216';
  }
  warmBtn.addEventListener('click', function(){ setTheme(false); });
  coolBtn.addEventListener('click', function(){ setTheme(true); });

  // 蒙层开关
  var tintOn = document.getElementById('tintOn'), tintOff = document.getElementById('tintOff');
  tintOn.addEventListener('click', function(){ app.classList.remove('no-tint'); tintOn.classList.add('on'); tintOff.classList.remove('on'); });
  tintOff.addEventListener('click', function(){ app.classList.add('no-tint'); tintOff.classList.add('on'); tintOn.classList.remove('on'); });

  function readImg(input, cb){
    var f = input.files && input.files[0];
    if (!f) return;
    var r = new FileReader();
    r.onload = function(){ cb(r.result); };
    r.readAsDataURL(f);
  }

  var photo = document.getElementById('photo'), bgFile = document.getElementById('bgFile');
  document.getElementById('bgUpload').addEventListener('click', function(){ bgFile.click(); });
  bgFile.addEventListener('change', function(){ readImg(bgFile, function(url){ photo.style.backgroundImage = 'url(' + url + ')'; app.classList.add('has-photo'); }); });
  document.getElementById('bgClear').addEventListener('click', function(){ photo.style.backgroundImage = 'none'; app.classList.remove('has-photo'); });

  function setAvatar(i, url){
    avatars[i].innerHTML = '<img src="' + url + '">';
    minis[i].innerHTML = '<img src="' + url + '">';
  }
  var av0File = document.getElementById('av0File'), av1File = document.getElementById('av1File');
  document.getElementById('av0Btn').addEventListener('click', function(){ av0File.click(); });
  document.getElementById('av1Btn').addEventListener('click', function(){ av1File.click(); });
  av0File.addEventListener('change', function(){ readImg(av0File, function(url){ setAvatar(0, url); }); });
  av1File.addEventListener('change', function(){ readImg(av1File, function(url){ setAvatar(1, url); }); });
})();
</script>
</body>
</html>
